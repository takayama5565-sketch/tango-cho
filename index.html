<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>無限単語帳 Duo Style</title>
    <style>
        /* 🦉 Duolingo風 カラーパレット */
        :root {
            --bg-color: #ffffff;
            --text-color: #4b4b4b;
            --text-light: #777777;
            --light-gray: #e5e5e5;
            --border-color: #e5e5e5;
            
            --duo-green: #58cc02;
            --duo-green-shadow: #58a700;
            --duo-red: #ff4b4b;
            --duo-red-shadow: #ea2b2b;
            --duo-blue: #1cb0f6;
            --duo-blue-shadow: #1899d6;
            --duo-orange: #ff9600;
            --duo-orange-shadow: #e58700;
            --duo-yellow: #ffc800;
            
            --card-bg: #ffffff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #131f24;
                --text-color: #ffffff;
                --text-light: #afafaf;
                --light-gray: #37464f;
                --border-color: #37464f;
                --card-bg: #202f36;
            }
        }

        body {
            font-family: "Nunito", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding-top: 60px; /* ヘッダー分 */
            padding-bottom: 90px; /* タブバー分 */
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        .container { max-width: 600px; margin: 0 auto; padding: 0 15px; }

        /* 🦉 ヘッダー (プログレス＆ステータス) */
        .header {
            position: fixed; top: 0; left: 0; width: 100%;
            background: var(--bg-color); z-index: 100;
            border-bottom: 2px solid var(--border-color);
        }
        .header-content {
            max-width: 600px; margin: 0 auto; padding: 10px 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .status-item { display: flex; align-items: center; font-weight: bold; font-size: 1.1rem; }
        .icon-fire { color: var(--duo-orange); margin-right: 5px; font-size: 1.3rem; }
        .icon-xp { color: var(--duo-blue); margin-right: 5px; font-size: 1.3rem; }
        .mute-btn {
            background: none; border: none; font-size: 1.5rem; color: var(--text-light); cursor: pointer;
        }

        /* 🦉 立体的なボタン (Duo Style) */
        .btn-duo {
            background-color: var(--duo-blue);
            color: white;
            border: none;
            border-radius: 16px;
            border-bottom: 4px solid var(--duo-blue-shadow);
            padding: 14px 20px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            text-align: center;
            transition: transform 0.1s, border-bottom-width 0.1s;
            margin-bottom: 15px;
        }
        .btn-duo:active {
            transform: translateY(4px);
            border-bottom-width: 0px;
            margin-bottom: 19px; /* レイアウト崩れ防止 */
        }
        
        .btn-green { background-color: var(--duo-green); border-bottom-color: var(--duo-green-shadow); }
        .btn-red { background-color: var(--duo-red); border-bottom-color: var(--duo-red-shadow); }
        .btn-orange { background-color: var(--duo-orange); border-bottom-color: var(--duo-orange-shadow); }
        .btn-gray { background-color: var(--light-gray); color: var(--text-color); border-bottom-color: var(--border-color); }

        /* 🦉 フォーム部品 */
        select, input, textarea {
            background: var(--card-bg); color: var(--text-color);
            border: 2px solid var(--border-color); border-radius: 12px;
            padding: 12px; font-size: 1rem; width: 100%; box-sizing: border-box; margin-bottom: 15px;
            font-weight: bold;
        }

        /* 🦉 学習用フラッシュカード */
        .study-progress-container { width: 100%; background: var(--light-gray); height: 16px; border-radius: 8px; margin-bottom: 20px; overflow: hidden; }
        .study-progress-bar { background: var(--duo-green); height: 100%; width: 0%; border-radius: 8px; transition: width 0.3s; }

        .card {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-bottom: 6px solid var(--border-color);
            border-radius: 20px;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: transform 0.1s;
        }
        .card:active { transform: scale(0.98); }
        
        .card-grade { font-size: 0.9rem; color: var(--duo-orange); font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
        .card-main { font-size: 2.5rem; font-weight: 800; margin: 0; color: var(--text-color); }
        .card-sub { font-size: 1.2rem; color: var(--text-light); margin-top: 5px; }
        
        /* 答え（裏面）エリア */
        .answer-area { display: none; width: 100%; margin-top: 15px; border-top: 2px dashed var(--border-color); padding-top: 15px; }
        .answer-main { font-size: 1.8rem; font-weight: bold; color: var(--duo-blue); margin: 0; }
        .answer-ex { font-size: 1rem; color: var(--text-light); margin-top: 10px; font-style: italic; }
        .answer-ex-jp { font-size: 0.95rem; color: var(--text-color); margin-top: 5px; }

        /* 🦉 SRS ボタン配置 (2カラム) */
        .srs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; display: none; }
        
        /* 🦉 タブバー */
        .tab-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--card-bg); border-top: 2px solid var(--border-color);
            display: flex; padding: 10px 0 20px 0; z-index: 100;
        }
        .tab-btn {
            flex: 1; background: none; border: none; color: var(--text-light);
            font-size: 0.9rem; font-weight: bold; cursor: pointer;
            display: flex; flex-direction: column; align-items: center;
        }
        .tab-btn.active { color: var(--duo-blue); }
        .tab-icon { font-size: 1.5rem; margin-bottom: 3px; }

        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ポケットモード (通勤用) */
        #pocket-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; color: #fff; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-content">
        <div class="status-item"><span class="icon-fire">🔥</span><span id="streak-count">1</span></div>
        <div class="status-item"><span class="icon-xp">💎</span><span id="xp-count">0</span> XP</div>
        <button class="mute-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
    </div>
</header>

<div class="container">
    <div id="view-study" class="view active">
        
        <div style="display: flex; gap: 10px;">
            <select id="study-grade" onchange="loadStudyQueue()" style="flex: 1;">
                <option value="all">全級</option>
                <option value="5級">5級</option>
                <option value="4級">4級</option>
                <option value="3級">3級</option>
            </select>
            <select id="study-mode" onchange="loadStudyQueue()" style="flex: 1;">
                <option value="en-jp">英語 ➔ 日本語</option>
                <option value="jp-en">日本語 ➔ 英語</option>
            </select>
        </div>

        <div class="study-progress-container">
            <div class="study-progress-bar" id="progress-bar"></div>
        </div>

        <div id="study-area">
            <div class="card" id="flashcard" onclick="flipCard()">
                <div class="card-grade" id="sc-grade"></div>
                <h1 class="card-main" id="sc-front-main"></h1>
                <p class="card-sub" id="sc-front-sub"></p>
                <p style="color: var(--text-light); font-size: 0.9rem; margin-top:20px;" id="tap-hint">タップして答えを確認</p>
                
                <div class="answer-area" id="answer-area">
                    <h2 class="answer-main" id="sc-back-main"></h2>
                    <p class="answer-ex" id="sc-ex-en"></p>
                    <p class="answer-ex-jp" id="sc-ex-jp"></p>
                </div>
            </div>

            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button class="btn-duo btn-gray" style="flex:1; padding: 10px;" onclick="playAudio('word')">🔈 単語</button>
                <button class="btn-duo btn-gray" style="flex:1; padding: 10px;" onclick="playAudio('ex')">🔈 例文</button>
            </div>
            
            <div class="srs-grid" id="srs-controls">
                <button class="btn-duo btn-red" onclick="answerSrs(0)">忘れた<br><span style="font-size:0.7rem;">1分後</span></button>
                <button class="btn-duo btn-orange" onclick="answerSrs(1)">難しい<br><span style="font-size:0.7rem;">10分後</span></button>
                <button class="btn-duo btn-blue" onclick="answerSrs(2)">普通<br><span style="font-size:0.7rem;">明日</span></button>
                <button class="btn-duo btn-green" onclick="answerSrs(3)">簡単<br><span style="font-size:0.7rem;">3日後</span></button>
            </div>
        </div>

        <div id="all-done" style="display: none; text-align: center; padding: 40px 10px;">
            <h1 style="color: var(--duo-yellow); font-size: 4rem; margin:0;">🎉</h1>
            <h2 style="color: var(--duo-green);">今日のレッスン完了！</h2>
            <p>復習する単語はありません。</p>
            <button class="btn-duo btn-green" style="margin-top:20px;" onclick="forceReviewAll()">さらに練習する</button>
        </div>
    </div>

    <div id="view-commute" class="view">
        <h2 style="text-align: center; color: var(--duo-blue);">リスニングモード</h2>
        <p style="text-align: center; color: var(--text-light); font-size:0.9rem;">
            画面がロックされない「ポケットモード」で、歩きながら学習できます。
        </p>
        
        <select id="com-grade-filter">
            <option value="all">全ての級を聴く</option>
            <option value="5級">5級のみ</option>
            <option value="4級">4級のみ</option>
            <option value="3級">3級のみ</option>
        </select>
        
        <button class="btn-duo btn-green" onclick="startCommute(false)">▶ 続きから再生</button>
        <button class="btn-duo btn-gray" onclick="startCommute(true)">🔄 最初から再生</button>
    </div>

    <div id="pocket-overlay">
        <p>🎧 リスニング中...</p>
        <h2 id="pocket-word" style="color: var(--duo-green); margin: 30px 0;"></h2>
        <button class="btn-duo btn-red" style="width:80%;" onclick="stopCommute()">停止して戻る</button>
    </div>

    <div id="view-data" class="view">
        <h2 style="text-align: center; color: var(--duo-orange);">データ管理</h2>
        
        <div style="background: var(--light-gray); padding: 15px; border-radius: 15px; margin-bottom: 20px;">
            <p style="margin-top:0; font-weight:bold; text-align:center;">収録単語数: <span id="count-total" style="color:var(--duo-blue);">0</span> 語</p>
            <p style="font-size:0.85rem; color:var(--text-light); text-align:center;">
                5級: <span id="count-5">0</span> / 4級: <span id="count-4">0</span> / 3級: <span id="count-3">0</span>
            </p>
        </div>

        <h3>データのインポート</h3>
        <p style="font-size:0.8rem; color:var(--text-light);">エクセルなどで作成したデータを貼り付けてください。</p>
        <textarea id="import-csv" rows="6" placeholder="英語	日本語	カタカナ	例文英	例文日	級"></textarea>
        <button class="btn-duo btn-green" onclick="importCSV()">記録する</button>
        
        <hr style="border: 1px dashed var(--border-color); margin: 30px 0;">
        <button class="btn-duo btn-red" onclick="clearAllData()">データをすべて消去する</button>
    </div>
</div>

<nav class="tab-bar">
    <button class="tab-btn active" id="tab-study" onclick="showTab('view-study', this)">
        <span class="tab-icon">📖</span>学ぶ
    </button>
    <button class="tab-btn" id="tab-commute" onclick="showTab('view-commute', this)">
        <span class="tab-icon">🎧</span>聴く
    </button>
    <button class="tab-btn" id="tab-data" onclick="showTab('view-data', this)">
        <span class="tab-icon">⚙️</span>記録
    </button>
</nav>

<script>
    // ==========================================
    // 🧠 アプリの状態・データ管理
    // ==========================================
    const defaultWords = [
        { id: 1, en: 'apple', jp: 'りんご', rubi: 'アップル', exEn: 'An apple a day.', exJp: '1日1個のりんご。', grade: '5級', box: 0, nextReview: 0 },
        { id: 2, en: 'water', jp: '水', rubi: 'ウォーター', exEn: 'Drink water.', exJp: '水を飲む。', grade: '5級', box: 0, nextReview: 0 }
    ];

    let words = [];
    try {
        const stored = localStorage.getItem('vocab_srs_duo');
        if (stored) words = JSON.parse(stored);
        if (!Array.isArray(words) || words.length === 0) words = defaultWords;
    } catch(e) { words = defaultWords; }

    let reviewQueue = [];
    let currentWord = null;
    let totalQueueCount = 0; // プログレスバー用
    
    // Duolingo風 XP(経験値)システム
    let xp = parseInt(localStorage.getItem('vocab_xp')) || 0;
    document.getElementById('xp-count').innerText = xp;

    // 音声管理（ミュート対応）
    let synth = window.speechSynthesis;
    let bestVoice = null;
    let isMuted = false;

    function initVoice() {
        const vs = synth.getVoices();
        bestVoice = vs.find(v => v.lang === 'en-US' && (v.name.includes('Premium') || v.name.includes('Samantha'))) || vs.find(v => v.lang.startsWith('en'));
    }
    if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = initVoice;

    function toggleMute() {
        isMuted = !isMuted;
        const btn = document.getElementById('mute-btn');
        if (isMuted) {
            btn.innerText = '🔇';
            synth.cancel(); // 再生中の音を即停止
        } else {
            btn.innerText = '🔊';
        }
    }

    // ==========================================
    // 🖥 UI制御
    // ==========================================
    function showTab(id, btnObj) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btnObj.classList.add('active');

        if(id === 'view-study') loadStudyQueue();
        if(id === 'view-data') updateWordCounts();
    }

    function updateWordCounts() {
        const counts = { total: words.length, g5: 0, g4: 0, g3: 0 };
        words.forEach(w => {
            if(w.grade === '5級') counts.g5++;
            else if(w.grade === '4級') counts.g4++;
            else if(w.grade === '3級') counts.g3++;
        });
        document.getElementById('count-total').innerText = counts.total;
        document.getElementById('count-5').innerText = counts.g5;
        document.getElementById('count-4').innerText = counts.g4;
        document.getElementById('count-3').innerText = counts.g3;
    }

    function addXP(amount) {
        xp += amount;
        localStorage.setItem('vocab_xp', xp);
        document.getElementById('xp-count').innerText = xp;
    }

    // ==========================================
    // 📖 学習ロジック
    // ==========================================
    function loadStudyQueue(forceAll = false) {
        if(words.length === 0) return;
        const grade = document.getElementById('study-grade').value;
        const now = Date.now();
        
        reviewQueue = words.filter(w => (grade === 'all' || w.grade === grade) && (forceAll || !w.nextReview || w.nextReview <= now));
        reviewQueue.sort(() => Math.random() - 0.5);
        totalQueueCount = reviewQueue.length;
        
        if(reviewQueue.length === 0) {
            document.getElementById('study-area').style.display = 'none';
            document.getElementById('progress-bar').style.width = '100%';
            document.getElementById('all-done').style.display = 'block';
        } else {
            document.getElementById('study-area').style.display = 'block';
            document.getElementById('all-done').style.display = 'none';
            showNextCard();
        }
    }

    function forceReviewAll() { loadStudyQueue(true); }

    function showNextCard() {
        if(reviewQueue.length === 0) { loadStudyQueue(); return; }
        currentWord = reviewQueue[0];
        
        // カードを初期状態に戻す
        const card = document.getElementById('flashcard');
        card.style.transform = "scale(0.95)";
        setTimeout(() => card.style.transform = "scale(1)", 100);
        
        document.getElementById('answer-area').style.display = 'none';
        document.getElementById('srs-controls').style.display = 'none';
        document.getElementById('tap-hint').style.display = 'block';
        
        const mode = document.getElementById('study-mode').value;
        const isEnToJp = (mode === 'en-jp');

        document.getElementById('sc-grade').innerText = currentWord.grade;
        
        // 表面のセット
        document.getElementById('sc-front-main').innerText = isEnToJp ? currentWord.en : currentWord.jp;
        document.getElementById('sc-front-sub').innerHTML = isEnToJp ? (currentWord.rubi ? currentWord.rubi.replace(/\[(.*?)\]/g, "<b>$1</b>") : "") : "";
        
        // 裏面のセット
        document.getElementById('sc-back-main').innerText = isEnToJp ? currentWord.jp : currentWord.en;
        document.getElementById('sc-ex-en').innerText = currentWord.exEn || "";
        document.getElementById('sc-ex-jp').innerText = currentWord.exJp || "";

        // プログレスバーの更新
        const doneCount = totalQueueCount - reviewQueue.length;
        const percent = totalQueueCount > 0 ? (doneCount / totalQueueCount) * 100 : 100;
        document.getElementById('progress-bar').style.width = `${percent}%`;
    }

    function flipCard() {
        const isAnswerShown = document.getElementById('answer-area').style.display === 'block';
        if(isAnswerShown) return; // 既に裏面なら何もしない

        document.getElementById('answer-area').style.display = 'block';
        document.getElementById('srs-controls').style.display = 'grid';
        document.getElementById('tap-hint').style.display = 'none';
        
        // めくった時に英語なら自動再生（ミュート時以外）
        if (!isMuted) {
            const mode = document.getElementById('study-mode').value;
            if(mode === 'jp-en') playAudio('word'); // 日本語→英語モードなら裏面（英語）を再生
            else playAudio('word'); // 英語→日本語でも発音を確認させる
        }
    }

    function answerSrs(q) {
        const now = Date.now();
        const intervals = [10*60*1000, 24*60*60*1000, 3*24*60*60*1000, 7*24*60*60*1000];
        
        if(q === 0) { 
            currentWord.box = 0; currentWord.nextReview = now + 60000; 
        } else {
            currentWord.box = (currentWord.box || 0) + (q === 3 ? 2 : 1);
            currentWord.nextReview = now + (intervals[Math.min(currentWord.box, intervals.length-1)]);
            addXP(10); // 正解でXP獲得
        }
        
        // ローカルストレージに保存
        localStorage.setItem('vocab_srs_duo', JSON.stringify(words));
        
        reviewQueue.shift();
        if(reviewQueue.length > 0) showNextCard(); else loadStudyQueue();
    }

    // ==========================================
    // 🔈 音声制御
    // ==========================================
    function playAudio(type) {
        if (isMuted || !currentWord) return;
        
        const now = Date.now();
        const rate = (now - (window.lastClick || 0) < 400) ? 0.3 : 1.0;
        window.lastClick = now;

        const text = type === 'word' ? currentWord.en : currentWord.exEn;
        if (!text) return;

        synth.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US'; 
        u.rate = rate; 
        u.pitch = 1.1;
        if(bestVoice) u.voice = bestVoice;
        synth.speak(u);
    }

    async function speakCommute(t, l, r = 1.0) {
        if (isMuted) return; // ミュートなら再生しない
        return new Promise(res => {
            const u = new SpeechSynthesisUtterance(t);
            u.lang = l; u.rate = r; u.pitch = 1.1;
            if(l.startsWith('en') && bestVoice) u.voice = bestVoice;
            u.onend = res; u.onerror = res;
            synth.speak(u);
        });
    }

    // ==========================================
    // 🎧 通勤モード
    // ==========================================
    let comActive = false; let comIdx = 0; let wakeLock = null;

    async function startCommute(restart = false) {
        if (isMuted) {
            alert("音声がミュート（消音）されています。右上のスピーカーアイコンをタップして音をONにしてください。");
            return;
        }

        comActive = true;
        document.getElementById('pocket-overlay').style.display = 'flex';
        try { if('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(e){}

        const filter = document.getElementById('com-grade-filter').value;
        const now = Date.now();
        let queue = words.filter(w => (filter === 'all' || w.grade === filter) && (!w.nextReview || w.nextReview <= now));
        if(queue.length === 0) queue = words.filter(w => filter === 'all' || w.grade === filter);
        if(queue.length === 0) { stopCommute(); alert("単語がありません。"); return; }
        
        if(restart) comIdx = 0;
        while(comActive && queue.length > 0) {
            const w = queue[comIdx % queue.length];
            document.getElementById('pocket-word').innerText = w.en;
            
            await speakCommute(w.jp, 'ja-JP', 1.0); if(!comActive) break;
            await speakCommute(w.en, 'en-US', 1.0); if(!comActive) break;
            await speakCommute(w.en, 'en-US', 0.3); if(!comActive) break;
            if (w.exJp) await speakCommute(w.exJp, 'ja-JP', 1.0); if(!comActive) break;
            if (w.exEn) await speakCommute(w.exEn, 'en-US', 1.0); if(!comActive) break;
            if (w.exEn) await speakCommute(w.exEn, 'en-US', 0.3); if(!comActive) break;
            
            await new Promise(r => setTimeout(r, 1500));
            comIdx++;
        }
    }

    function stopCommute() {
        comActive = false; synth.cancel();
        if(wakeLock) { wakeLock.release(); wakeLock = null; }
        document.getElementById('pocket-overlay').style.display = 'none';
    }

    // ==========================================
    // 📥 データインポート (バグ修正済)
    // ==========================================
    function importCSV() {
        const text = document.getElementById('import-csv').value.trim();
        if(!text) { alert("テキストが入力されていません。"); return; }
        
        // デフォルトのサンプルデータ(apple, water)しかない場合は、空にしてから追加する
        if(words.length <= 2 && words[0].en === 'apple') words = [];

        const lines = text.split('\n');
        let addedCount = 0;
        
        lines.forEach(line => {
            const c = line.split(/\t|,/);
            // 最低限 英語(c[0]) と 日本語(c[1]) があれば追加
            if(c.length >= 2 && c[0].trim() !== '') {
                words.push({ 
                    id: Date.now() + Math.random(), 
                    en: c[0].trim(), 
                    jp: c[1].trim(), 
                    rubi: c[2]?.trim() || "", 
                    exEn: c[3]?.trim() || "", 
                    exJp: c[4]?.trim() || "", 
                    grade: c[5]?.trim() || "5級", 
                    box: 0,
                    nextReview: 0
                });
                addedCount++;
            }
        });
        
        // 強制的に上書き保存
        try {
            localStorage.setItem('vocab_srs_duo', JSON.stringify(words));
            alert(`${addedCount} 件の単語を記録しました！`); 
            document.getElementById('import-csv').value = '';
            updateWordCounts(); 
            loadStudyQueue();
        } catch(e) {
            alert("保存に失敗しました。iPhoneの容量がいっぱいか、プライベートブラウズモードの可能性があります。");
        }
    }

    function clearAllData() { 
        if(confirm("本当に全てのデータを消去しますか？（元に戻せません）")) { 
            localStorage.removeItem('vocab_srs_duo');
            localStorage.removeItem('vocab_xp');
            location.reload(); 
        } 
    }

    // 初期化実行
    initVoice(); 
    loadStudyQueue();
</script>
</body>
</html>
