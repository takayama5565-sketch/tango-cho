<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>無限単語帳 Ultimate</title>
    <style>
        /* 🦉 Duolingo風 カラー＆デザイン */
        :root {
            --bg-color: #ffffff; --text-color: #4b4b4b; --text-light: #777777;
            --light-gray: #e5e5e5; --border-color: #e5e5e5; --card-bg: #ffffff;
            --duo-green: #58cc02; --duo-green-shadow: #58a700;
            --duo-red: #ff4b4b; --duo-red-shadow: #ea2b2b;
            --duo-blue: #1cb0f6; --duo-blue-shadow: #1899d6;
            --duo-orange: #ff9600; --duo-orange-shadow: #e58700;
            --duo-yellow: #ffc800; --duo-purple: #ce82ff; --duo-purple-shadow: #a561cc;
        }
        @media (prefers-color-scheme: dark) {
            :root { --bg-color: #131f24; --text-color: #ffffff; --text-light: #afafaf; --light-gray: #37464f; --border-color: #37464f; --card-bg: #202f36; }
        }

        body { font-family: "Nunito", -apple-system, sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; padding-top: 60px; padding-bottom: 90px; overflow-x: hidden; -webkit-user-select: none; user-select: none; }
        .container { max-width: 600px; margin: 0 auto; padding: 0 15px; }

        /* ヘッダー */
        .header { position: fixed; top: 0; left: 0; width: 100%; background: var(--bg-color); z-index: 100; border-bottom: 2px solid var(--border-color); }
        .header-content { max-width: 600px; margin: 0 auto; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
        .status-item { display: flex; align-items: center; font-weight: 800; font-size: 1.1rem; color: var(--text-color); }
        .icon-xp { color: var(--duo-blue); margin-right: 5px; font-size: 1.3rem; }
        .mute-btn { background: none; border: none; font-size: 1.5rem; color: var(--text-light); cursor: pointer; }

        /* トースト通知 */
        #toast { position: fixed; top: 70px; right: 15px; background: var(--duo-purple); color: white; padding: 12px 20px; border-radius: 12px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); display: none; z-index: 1000; animation: slideIn 0.3s forwards; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        /* 立体的ボタン */
        .btn-duo { background-color: var(--duo-blue); color: white; border: none; border-radius: 16px; border-bottom: 4px solid var(--duo-blue-shadow); padding: 14px 20px; font-size: 1.1rem; font-weight: 800; cursor: pointer; width: 100%; text-align: center; transition: transform 0.1s, border-bottom-width 0.1s; margin-bottom: 15px; box-sizing: border-box; }
        .btn-duo:active { transform: translateY(4px); border-bottom-width: 0px; margin-bottom: 19px; }
        .btn-green { background-color: var(--duo-green); border-bottom-color: var(--duo-green-shadow); }
        .btn-red { background-color: var(--duo-red); border-bottom-color: var(--duo-red-shadow); }
        .btn-orange { background-color: var(--duo-orange); border-bottom-color: var(--duo-orange-shadow); }
        .btn-purple { background-color: var(--duo-purple); border-bottom-color: var(--duo-purple-shadow); }
        .btn-gray { background-color: var(--light-gray); color: var(--text-color); border-bottom-color: var(--border-color); }

        select, input[type="text"], input[type="number"], textarea { background: var(--card-bg); color: var(--text-color); border: 2px solid var(--border-color); border-radius: 12px; padding: 12px; font-size: 1rem; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-weight: bold; }

        /* ハブメニュー */
        .hub-section-title { font-size: 1.2rem; font-weight: 800; color: var(--duo-green); margin: 25px 0 10px 0; border-bottom: 2px dashed var(--border-color); padding-bottom: 5px; }
        .hub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .hub-card { background: var(--card-bg); border: 2px solid var(--border-color); border-bottom: 5px solid var(--border-color); border-radius: 16px; padding: 20px 10px; text-align: center; cursor: pointer; transition: transform 0.1s; }
        .hub-card:active { transform: translateY(4px); border-bottom-width: 1px; margin-bottom: 4px; }
        .hub-icon { font-size: 2.5rem; margin-bottom: 10px; }
        .hub-title { font-weight: 800; font-size: 1.1rem; color: var(--text-color); }

        /* 学習コンテナ */
        .progress-container { width: 100%; background: var(--light-gray); height: 16px; border-radius: 8px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { background: var(--duo-green); height: 100%; width: 0%; border-radius: 8px; transition: width 0.3s; }
        .card { background: var(--card-bg); border: 2px solid var(--border-color); border-bottom: 6px solid var(--border-color); border-radius: 20px; min-height: 250px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; margin-bottom: 20px; transition: transform 0.1s; }
        .srs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; display: none; }

        /* 📚 ショートストーリー */
        .story-text-area { background: var(--card-bg); border: 2px solid var(--border-color); border-radius: 16px; padding: 20px; font-size: 1.2rem; line-height: 1.8; margin-bottom: 20px; max-height: 50vh; overflow-y: auto; }
        .story-word { cursor: pointer; border-bottom: 2px dotted var(--duo-blue); display: inline-block; margin: 0 2px; transition: background 0.2s; border-radius: 4px;}
        .story-word:active { background: #e1f5fe; }
        .dict-tooltip { position: fixed; background: #333; color: #fff; padding: 8px 12px; border-radius: 8px; font-size: 1rem; font-weight: bold; z-index: 10000; display: none; transform: translateX(-50%) translateY(-120%); pointer-events: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); white-space: nowrap; }
        .dict-tooltip::after { content: ''; position: absolute; bottom: -8px; left: 50%; margin-left: -8px; border-width: 8px 8px 0; border-style: solid; border-color: #333 transparent transparent transparent; }
        
        .quiz-area { background: var(--card-bg); border: 2px solid var(--duo-orange); border-radius: 16px; padding: 20px; display: none; }
        .quiz-q { font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; color: var(--text-color); }
        .quiz-options { display: flex; flex-direction: column; gap: 10px; }

        /* 🧩 マッチング＆絶景パズル */
        .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .match-btn { background: var(--card-bg); border: 2px solid var(--border-color); border-bottom: 4px solid var(--border-color); border-radius: 12px; padding: 15px 5px; text-align: center; font-weight: bold; font-size: 1rem; cursor: pointer; color: var(--text-color); transition: all 0.1s; }
        .match-btn.selected { background: #e1f5fe; border-color: var(--duo-blue); border-bottom-color: var(--duo-blue-shadow); color: var(--duo-blue); }
        .match-btn.matched { background: var(--light-gray); border-color: var(--border-color); color: transparent; pointer-events: none; border-bottom-width: 2px; transform: translateY(2px); }
        .match-btn.error { background: #ffebee; border-color: var(--duo-red); color: var(--duo-red); animation: shake 0.3s; }
        @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-5px);} 75%{transform:translateX(5px);} }

        .puzzle-wrapper { position: relative; width: 100%; aspect-ratio: 4/3; border-radius: 16px; overflow: hidden; border: 4px solid var(--border-color); margin-bottom: 20px; background: #000; }
        .puzzle-image { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; }
        .puzzle-grid { position: absolute; top:0; left:0; width: 100%; height: 100%; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 1px; }
        .puzzle-piece { background: var(--light-gray); display: flex; justify-content: center; align-items: center; font-weight: bold; color: #aaa; font-size: 1.5rem; transition: opacity 0.8s ease-in-out; }
        .puzzle-piece.revealed { opacity: 0; }

        /* 💬 AIチャット */
        .chat-box { background: var(--light-gray); border-radius: 16px; padding: 15px; height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
        .chat-msg { max-width: 80%; padding: 12px 16px; border-radius: 16px; font-weight: bold; line-height: 1.4; }
        .msg-ai { background: var(--card-bg); align-self: flex-start; border-bottom-left-radius: 4px; border: 2px solid var(--border-color); }
        .msg-user { background: var(--duo-blue); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .chat-input-area { display: flex; gap: 8px; align-items: center; }

        /* タブバー */
        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card-bg); border-top: 2px solid var(--border-color); display: flex; padding: 10px 0 20px 0; z-index: 100; justify-content: space-around; }
        .tab-btn { background: none; border: none; color: var(--text-light); font-size: 0.8rem; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; align-items: center; width: 33%; }
        .tab-btn.active { color: var(--duo-blue); }
        .tab-icon { font-size: 1.6rem; margin-bottom: 2px; }

        .view, .sub-view { display: none; }
        .view.active, .sub-view.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #pocket-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; color: #fff; flex-direction: column; justify-content: center; align-items: center; }
        
        .mic-active { background-color: #ffcdd2 !important; border-color: #f44336 !important; }
        .create-story-box { background: var(--light-gray); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .quiz-input-group { background: var(--card-bg); padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border-color); }
    </style>
</head>
<body>

<header class="header">
    <div class="header-content">
        <div style="font-weight: 900; color: var(--duo-green); font-size: 1.2rem;" onclick="goHome('study')">DuoVocab</div>
        <div class="status-item"><span class="icon-xp">💎</span><span id="xp-count">0</span> XP</div>
        <button class="mute-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
    </div>
</header>

<div id="toast">🧩 パズルのピースを獲得！</div>
<div id="dict-tooltip" class="dict-tooltip"></div>

<div class="container">
    
    <div id="view-home" class="view active">
        <select id="hub-grade-filter" style="margin-bottom: 5px;">
            <option value="all">全級から出題</option><option value="5級">5級</option><option value="4級">4級</option><option value="3級">3級</option>
        </select>
        
        <div class="hub-section-title">🔰 基本レッスン</div>
        <div class="hub-grid">
            <div class="hub-card" onclick="startSubMode('word')">
                <div class="hub-icon">🔤</div><div class="hub-title">単語・文章</div>
            </div>
            <div class="hub-card" onclick="startSubMode('listen')">
                <div class="hub-icon">👂</div><div class="hub-title">リスニング</div>
            </div>
            <div class="hub-card" onclick="startSubMode('speak')">
                <div class="hub-icon">🗣️</div><div class="hub-title">スピーキング</div>
            </div>
            <div class="hub-card" onclick="startCommute()">
                <div class="hub-icon">🎧</div><div class="hub-title">通勤(自動再生)</div>
            </div>
        </div>
    </div>

    <div id="view-play" class="view">
        <div class="hub-section-title" style="color:var(--duo-orange);">🌟 応用・お楽しみ</div>
        <div class="hub-grid">
            <div class="hub-card" onclick="showSubView('view-chat')">
                <div class="hub-icon">💬</div><div class="hub-title">AIロールプレイ</div>
            </div>
            <div class="hub-card" onclick="showSubView('view-stories')">
                <div class="hub-icon">📚</div><div class="hub-title">長文ストーリー</div>
            </div>
            <div class="hub-card" onclick="showSubView('view-match')">
                <div class="hub-icon">🧩</div><div class="hub-title">マッチング</div>
            </div>
            <div class="hub-card" onclick="showSubView('view-puzzle')">
                <div class="hub-icon">🖼️</div><div class="hub-title">絶景パズル</div>
            </div>
        </div>
    </div>

    <div id="view-study" class="sub-view">
        <button class="btn-duo btn-gray" style="padding: 10px; margin-bottom: 15px;" onclick="goHome('study')">🔙 戻る</button>
        
        <select id="study-mode" onchange="loadStudyQueue()" style="display:none; margin-bottom:15px;">
            <option value="en-jp">英語 ➔ 日本語 (意味を答える)</option>
            <option value="jp-en">日本語 ➔ 英語 (英語を思い浮かべる)</option>
            <option value="jp-en-type">日本語 ➔ 英語 (スペルを入力する)</option>
        </select>

        <div class="progress-container"><div class="progress-bar" id="progress-bar"></div></div>

        <div id="study-area">
            <div class="card" id="flashcard">
                <div style="font-size: 0.9rem; color: var(--duo-orange); font-weight: bold;" id="sc-grade"></div>
                <h1 style="font-size: 2.2rem; font-weight: 800; margin: 10px 0; color: var(--text-color);" id="sc-front-main"></h1>
                <p style="font-size: 1.1rem; color: var(--text-light); margin-top: 5px;" id="sc-front-sub"></p>
                <p style="color: var(--text-light); font-size: 0.9rem; margin-top:20px; cursor:pointer;" id="tap-hint" onclick="flipCard()">👇 タップして答えを確認</p>
                
                <div id="interaction-area" style="display: none; width: 100%; margin-top: 15px;">
                    <input type="text" id="type-input" placeholder="英語を入力..." style="display:none;" onkeypress="if(event.key==='Enter') checkInteractionAnswer()">
                    <button id="speak-mic-btn" class="btn-duo btn-gray" style="display:none; border-radius:50%; width:80px; height:80px; font-size:2rem; margin: 10px auto;" onclick="startSpeakingCheck()">🎤</button>
                    <button class="btn-duo btn-blue" id="check-btn" style="margin-bottom:5px;" onclick="checkInteractionAnswer()">判定する</button>
                    <p id="interaction-feedback" style="font-weight:bold; margin: 10px 0 0 0; font-size:1.1rem;"></p>
                </div>

                <div id="answer-area" style="display: none; width: 100%; margin-top: 15px; border-top: 2px dashed var(--border-color); padding-top: 15px;">
                    <h2 style="font-size: 1.6rem; font-weight: bold; color: var(--duo-blue); margin: 0;" id="sc-back-main"></h2>
                    <p style="font-size: 1rem; color: var(--text-light); margin-top: 10px; font-style: italic;" id="sc-ex-en"></p>
                    <p style="font-size: 0.95rem; color: var(--text-color); margin-top: 5px;" id="sc-ex-jp"></p>
                </div>
            </div>

            <div style="display:flex; gap:10px; margin-bottom:15px;" id="audio-controls">
                <button class="btn-duo btn-gray" style="flex:1; padding: 10px;" onclick="playAudio('word')">🔈 音声</button>
                <button class="btn-duo btn-gray" style="flex:1; padding: 10px;" onclick="playAudio('word', 0.2)">🐢 ゆっくり</button>
            </div>
            
            <div class="srs-grid" id="srs-controls">
                <button class="btn-duo btn-red" onclick="answerSrs(0)">忘れた<br><span style="font-size:0.7rem;">1分後</span></button>
                <button class="btn-duo btn-orange" onclick="answerSrs(1)">難しい<br><span style="font-size:0.7rem;">10分後</span></button>
                <button class="btn-duo btn-blue" onclick="answerSrs(2)">普通<br><span style="font-size:0.7rem;">明日</span></button>
                <button class="btn-duo btn-green" onclick="answerSrs(3)">簡単<br><span style="font-size:0.7rem;">3日後</span></button>
            </div>
        </div>

        <div id="all-done" style="display: none; text-align: center; padding: 40px 10px;">
            <h1 style="color: var(--duo-yellow); font-size: 4rem; margin:0;">🎉</h1>
            <h2 style="color: var(--duo-green);">レッスン完了！</h2>
            <button class="btn-duo btn-purple" style="margin-top:20px;" onclick="loadNewLesson()">未出題の新しい単語を練習</button>
        </div>
    </div>

    <div id="view-stories" class="sub-view">
        <button class="btn-duo btn-gray" style="padding: 10px; margin-bottom: 15px;" onclick="goHome('play')">🔙 戻る</button>
        <h2 style="text-align: center; color: var(--duo-green); margin-top:0;">長文ストーリー読解</h2>
        <p style="text-align: center; color: var(--text-light); font-size:0.85rem;">単語をタップすると意味がわかります。<br>未登録の単語はAIが自動で翻訳します！</p>
        
        <select id="story-selector" onchange="loadStory()"></select>
        
        <div class="story-text-area" id="story-box"></div>
        <button class="btn-duo btn-orange" id="btn-start-quiz" onclick="startStoryQuiz()" style="display:none;">📖 読んだ！問題に挑戦する</button>

        <div class="quiz-area" id="story-quiz-area">
            <div style="font-weight:bold; color:var(--duo-orange); margin-bottom:10px;" id="sq-progress">問題 1 / 5</div>
            <div class="quiz-q" id="sq-q"></div>
            <div class="quiz-options" id="sq-options"></div>
        </div>
        
        <div id="story-done" style="display:none; text-align:center; padding: 20px 0;">
            <h1 style="color: var(--duo-yellow); font-size: 3rem; margin:0;">💎 +100 XP</h1>
            <h3 style="color: var(--duo-green);">全問クリア！読解力アップ！</h3>
        </div>
    </div>

    <div id="view-chat" class="sub-view">
        <button class="btn-duo btn-gray" style="padding: 10px; margin-bottom: 15px;" onclick="goHome('play')">🔙 戻る</button>
        <h2 style="text-align: center; color: var(--duo-blue); margin-top:0;">AIロールプレイ</h2>
        <div class="chat-box" id="chat-box"></div>
        <div class="chat-input-area
